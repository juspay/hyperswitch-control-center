name: Playwright Tests
permissions:
  contents: read

on:
  pull_request:
  merge_group:

jobs:
  playwright-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Execute Shell Script
        run: |
          chmod +x playwright-tests/start_hyperswitch.sh
          sh playwright-tests/start_hyperswitch.sh

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install --force

      - name: Install Playwright Browsers
        # Installing only Chrome (Chromium) for now
        # To add other browsers later:
        #   - Multiple: npx playwright install chromium firefox webkit --with-deps
        #   - Available: chromium, chrome, chrome-beta, msedge, msedge-beta, msedge-dev, firefox, webkit
        run: npx playwright install chromium --with-deps

      - name: Build application
        run: npm run build:test

      - name: Health check for Backend
        run: |
          # Once the backend services are up, hit the health endpoint with the actual curl request
          response=$(curl --location --request GET 'http://0.0.0.0:8080/health')
          echo "Response:"
          echo "$response"

      - name: Run Playwright tests with coverage
        run: PW_COVERAGE=true npx playwright test --project=chromium
        env:
          PLAYWRIGHT_USERNAME: ${{ secrets.CYPRESS_USERNAME }}
          PLAYWRIGHT_PASSWORD: ${{ secrets.CYPRESS_PASSWORD }}
          PLAYWRIGHT_SSO_BASE_URL: ${{ secrets.CYPRESS_SSO_BASE_URL }}
          PLAYWRIGHT_SSO_CLIENT_ID: ${{ secrets.CYPRESS_SSO_CLIENT_ID }}
          PLAYWRIGHT_SSO_CLIENT_SECRET: ${{ secrets.CYPRESS_SSO_CLIENT_SECRET }}
          PLAYWRIGHT_SSO_USERNAME: ${{ secrets.CYPRESS_SSO_USERNAME }}
          PLAYWRIGHT_SSO_PASSWORD: ${{ secrets.CYPRESS_SSO_PASSWORD }}

      - name: Generate coverage report
        if: always()
        run: npm run pw:coverage:report
        continue-on-error: true

      - name: Publish Coverage to GitHub Summary
        if: always()
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: coverage/lcov.info
          badge: true
          fail_below_min: false
          format: markdown
          hide_branch_rate: false
          hide_complexity: true
          indicators: true
          output: both
          thresholds: "50 80"
        continue-on-error: true

      - name: Add Coverage Summary to Job
        if: always()
        run: |
          echo "## Playwright Test Coverage" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f coverage/lcov.info ]; then
            echo "✅ Coverage report generated successfully" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Coverage Artifacts" >> $GITHUB_STEP_SUMMARY
            echo "- [HTML Report](coverage/index.html)" >> $GITHUB_STEP_SUMMARY
            echo "- [LCOV Report](coverage/lcov-report/index.html)" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Coverage report not generated" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY

      - name: Publish Test Summary Results
        uses: ctrf-io/github-test-reporter@v1
        if: always()
        with:
          report-path: "./ctrf/*.json"
          github-report: true

      - name: Artifact - Coverage Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-coverage
          path: |
            coverage/
            .nyc_output/
          retention-days: 7

      - name: Artifact - Failed Test Results Only
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-failures
          path: |
            test-results/**/*-failed-*
            test-results/**/*-retry*/
          if-no-files-found: ignore
          retention-days: 7

      - name: Artifact - Playwright HTML Report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
