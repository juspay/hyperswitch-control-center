name: Playwright Tests
permissions:
  contents: read

on:
  pull_request:
  merge_group:
  workflow_dispatch:
    inputs:
      shard:
        description: "Shard to run: 'all' or one of 1, 2, 3"
        default: "all"
        type: choice
        options:
          - all
          - "1"
          - "2"
          - "3"

jobs:
  setup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 24

      - name: Cache node_modules
        id: node-modules-cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-node24-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        run: npm install --force

      - name: Build application
        run: npm run build:test

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: playwright-dist
          path: dist/
          if-no-files-found: error
          retention-days: 1

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright Browsers
        run: npx playwright install chromium --with-deps

  playwright-tests:
    needs: setup
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        shard: ${{ (github.event_name == 'workflow_dispatch' && inputs.shard != 'all') && fromJSON(format('[{0}]', inputs.shard)) || fromJSON('[1, 2, 3]') }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Start backend services
        run: |
          chmod +x playwright-tests/start_hyperswitch.sh
          sh playwright-tests/start_hyperswitch.sh

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 24

      - name: Restore node_modules
        id: node-modules-cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-node24-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        run: npm install --force

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: playwright-dist
          path: dist/

      - name: Restore Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Health check for Backend
        run: |
          # Once the backend services are up, hit the health endpoint with the actual curl request
          response=$(curl --location --request GET 'http://0.0.0.0:8080/health')
          echo "Response:"
          echo "$response"

      - name: Run Playwright tests (Shard ${{ matrix.shard }}/3)
        run: npx playwright test --shard=${{ matrix.shard }}/3
        env:
          PW_COVERAGE: "1"
          PLAYWRIGHT_USERNAME: ${{ secrets.CYPRESS_USERNAME }}
          PLAYWRIGHT_PASSWORD: ${{ secrets.CYPRESS_PASSWORD }}
          PLAYWRIGHT_SSO_BASE_URL: ${{ secrets.CYPRESS_SSO_BASE_URL }}
          PLAYWRIGHT_SSO_CLIENT_ID: ${{ secrets.CYPRESS_SSO_CLIENT_ID }}
          PLAYWRIGHT_SSO_CLIENT_SECRET: ${{ secrets.CYPRESS_SSO_CLIENT_SECRET }}
          PLAYWRIGHT_SSO_USERNAME: ${{ secrets.CYPRESS_SSO_USERNAME }}
          PLAYWRIGHT_SSO_PASSWORD: ${{ secrets.CYPRESS_SSO_PASSWORD }}

      - name: Publish Test Summary Results
        uses: ctrf-io/github-test-reporter@v1
        if: always()
        with:
          report-path: "./ctrf/*.json"
          github-report: true

      - name: Publish coverage to job summary
        if: always()
        run: |
          if [ -f coverage-report/coverage-summary.md ]; then
            echo "## 📊 Playwright Code Coverage" >> "$GITHUB_STEP_SUMMARY"
            cat coverage-report/coverage-summary.md >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "_Full HTML report: download the \`playwright-coverage\` artifact below._" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "⚠️ Coverage summary not generated (coverage-report/coverage-summary.md missing)." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Artifact - Failed Test Artifacts
        uses: actions/upload-artifact@v4
        if: false #failure()
        with:
          name: playwright-artifacts
          path: |
            test-results/**/*-failed-*
            test-results/**/*-retry*/
            playwright-report/
            playwright-report/
          if-no-files-found: ignore
          retention-days: 7

      - name: Artifact - Playwright Coverage Report
        uses: actions/upload-artifact@v4
        if: false #always()
        with:
          name: playwright-coverage
          path: coverage-report/
          if-no-files-found: warn
          retention-days: 7
