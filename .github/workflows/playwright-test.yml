name: Playwright Tests
permissions:
  contents: read

on:
  pull_request:
  merge_group:
  workflow_dispatch:
    inputs:
      shard:
        description: "Shard to run: 'all' or one of 1, 2, 3"
        default: "all"
        type: choice
        options:
          - all
          - "1"
          - "2"
          - "3"

jobs:
  setup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 24

      - name: Cache node_modules
        id: node-modules-cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-node24-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        run: npm install --force

      - name: Build application
        run: npm run build:test

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: playwright-dist
          path: dist/
          if-no-files-found: error
          retention-days: 1

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright Browsers
        run: npx playwright install chromium --with-deps

  playwright-tests:
    needs: setup
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        shard: ${{ (github.event_name == 'workflow_dispatch' && inputs.shard != 'all') && fromJSON(format('[{0}]', inputs.shard)) || fromJSON('[1, 2, 3]') }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Start backend services
        run: |
          chmod +x playwright-tests/start_hyperswitch.sh
          sh playwright-tests/start_hyperswitch.sh

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 24

      - name: Restore node_modules
        id: node-modules-cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-node24-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        run: npm install --force

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: playwright-dist
          path: dist/

      - name: Restore Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Health check for Backend
        run: |
          # Once the backend services are up, hit the health endpoint with the actual curl request
          response=$(curl --location --request GET 'http://0.0.0.0:8080/health')
          echo "Response:"
          echo "$response"

      - name: Run Playwright tests (Shard ${{ matrix.shard }}/3)
        run: npx playwright test --shard=${{ matrix.shard }}/3
        env:
          PW_COVERAGE: "1"
          PLAYWRIGHT_USERNAME: ${{ secrets.CYPRESS_USERNAME }}
          PLAYWRIGHT_PASSWORD: ${{ secrets.CYPRESS_PASSWORD }}
          PLAYWRIGHT_SSO_BASE_URL: ${{ secrets.CYPRESS_SSO_BASE_URL }}
          PLAYWRIGHT_SSO_CLIENT_ID: ${{ secrets.CYPRESS_SSO_CLIENT_ID }}
          PLAYWRIGHT_SSO_CLIENT_SECRET: ${{ secrets.CYPRESS_SSO_CLIENT_SECRET }}
          PLAYWRIGHT_SSO_USERNAME: ${{ secrets.CYPRESS_SSO_USERNAME }}
          PLAYWRIGHT_SSO_PASSWORD: ${{ secrets.CYPRESS_SSO_PASSWORD }}

      - name: Publish Test Summary Results
        uses: ctrf-io/github-test-reporter@v1
        if: always()
        with:
          report-path: "./ctrf/*.json"
          github-report: true

      - name: Publish coverage to job summary
        if: always()
        run: |
          if [ -f coverage-report/coverage-summary.md ]; then
            echo "## 📊 Playwright Code Coverage — Shard ${{ matrix.shard }}/3" >> "$GITHUB_STEP_SUMMARY"
            echo "_Shard-scoped only. See the \`merge-coverage\` job for the unified suite report._" >> "$GITHUB_STEP_SUMMARY"
            cat coverage-report/coverage-summary.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "⚠️ Coverage summary not generated for shard ${{ matrix.shard }} (coverage-report/coverage-summary.md missing)." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Artifact - Failed Test Artifacts
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-artifacts-shard-${{ matrix.shard }}
          path: |
            test-results/**/*-failed-*
            test-results/**/*-retry*/
            playwright-report/
          if-no-files-found: ignore
          retention-days: 7

      - name: Artifact - Playwright Coverage Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-coverage-shard-${{ matrix.shard }}
          path: coverage-report/
          if-no-files-found: warn
          retention-days: 7

  merge-coverage:
    needs: playwright-tests
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 24

      - name: Restore node_modules
        id: node-modules-cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-node24-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        run: npm install --force

      - name: Download all shard coverage artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: playwright-coverage-shard-*
          path: coverage-shards/

      - name: Combine raw V8 data from each shard
        run: |
          mkdir -p merged-raw
          shopt -s nullglob
          shard_count=0
          for shard_dir in coverage-shards/playwright-coverage-shard-*/; do
            shard_count=$((shard_count + 1))
            if [ -d "${shard_dir}raw" ]; then
              # Each raw V8 file is uniquely named (test id + hash) so a flat
              # copy across shards won't collide.
              cp -a "${shard_dir}raw/." merged-raw/ 2>/dev/null || true
            else
              echo "⚠️  No raw/ dir in ${shard_dir} — that shard's coverage will be missing from the merge."
            fi
          done
          raw_files=$(find merged-raw -type f | wc -l)
          echo "Combined raw files: ${raw_files} (from ${shard_count} shard artifact(s))"
          if [ "$raw_files" -eq 0 ]; then
            echo "::warning::No raw coverage data found in any shard; merged report will be empty."
          fi

      - name: Generate merged coverage report
        run: |
          if [ -z "$(ls -A merged-raw 2>/dev/null)" ]; then
            echo "Skipping mcr — merged-raw is empty."
            exit 0
          fi
          npx mcr -c mcr.config.js -i merged-raw -o coverage-report-merged

      - name: Publish merged coverage to job summary
        if: always()
        run: |
          if [ -f coverage-report-merged/coverage-summary.md ]; then
            echo "## 📊 Playwright Code Coverage — Merged (all shards)" >> "$GITHUB_STEP_SUMMARY"
            cat coverage-report-merged/coverage-summary.md >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "_Full HTML report: download the \`playwright-coverage-merged\` artifact below._" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "⚠️ Merged coverage summary not generated (coverage-report-merged/coverage-summary.md missing)." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Artifact - Merged Coverage Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-coverage-merged
          path: coverage-report-merged/
          if-no-files-found: warn
          retention-days: 14
