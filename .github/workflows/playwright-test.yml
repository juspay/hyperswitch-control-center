name: Playwright Tests
permissions:
  contents: read

on:
  pull_request:
  merge_group:
  workflow_dispatch:
    inputs:
      shard:
        description: "Shard to run: 'all' or one of 1, 2, 3, 4"
        default: "all"
        type: choice
        options:
          - all
          - "1"
          - "2"
          - "3"
          - "4"

concurrency:
  group: playwright-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  setup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build:test

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: playwright-dist
          path: dist/
          if-no-files-found: error
          retention-days: 1

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright Browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps

  playwright-tests:
    needs: setup
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        shard: ${{ (github.event_name == 'workflow_dispatch' && inputs.shard != 'all') && fromJSON(format('[{0}]', inputs.shard)) || fromJSON('[1, 2, 3, 4]') }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Start backend services
        run: |
          chmod +x playwright-tests/start_hyperswitch.sh
          sh playwright-tests/start_hyperswitch.sh

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: playwright-dist
          path: dist/

      - name: Restore Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright browsers (fallback on cache miss)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps

      - name: Health check for Backend
        run: |
          # Once the backend services are up, hit the health endpoint with the actual curl request
          response=$(curl --location --request GET 'http://0.0.0.0:8080/health')
          echo "Response:"
          echo "$response"

      - name: Run Playwright tests (Shard ${{ matrix.shard }}/4)
        run: npx playwright test --shard=${{ matrix.shard }}/4
        env:
          PW_COVERAGE: "1"
          PLAYWRIGHT_USERNAME: ${{ secrets.CYPRESS_USERNAME }}
          PLAYWRIGHT_PASSWORD: ${{ secrets.CYPRESS_PASSWORD }}
          PLAYWRIGHT_SSO_BASE_URL: ${{ secrets.CYPRESS_SSO_BASE_URL }}
          PLAYWRIGHT_SSO_CLIENT_ID: ${{ secrets.CYPRESS_SSO_CLIENT_ID }}
          PLAYWRIGHT_SSO_CLIENT_SECRET: ${{ secrets.CYPRESS_SSO_CLIENT_SECRET }}
          PLAYWRIGHT_SSO_USERNAME: ${{ secrets.CYPRESS_SSO_USERNAME }}
          PLAYWRIGHT_SSO_PASSWORD: ${{ secrets.CYPRESS_SSO_PASSWORD }}

      - name: Publish Test Summary Results
        uses: ctrf-io/github-test-reporter@v1
        if: always()
        with:
          report-path: "./ctrf/*.json"
          github-report: true

      - name: Artifact - Failed Test Artifacts
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-artifacts-shard-${{ matrix.shard }}
          path: |
            test-results/**/*-failed-*
            test-results/**/*-retry*/
            playwright-report/
          if-no-files-found: ignore
          retention-days: 7

      - name: Artifact - Playwright Coverage Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-coverage-shard-${{ matrix.shard }}
          path: coverage-report/raw/
          if-no-files-found: warn
          retention-days: 1

  merge-coverage:
    needs: playwright-tests
    runs-on: ubuntu-latest
    if: always()
    permissions:
      contents: read
      actions: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Download all shard coverage artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: playwright-coverage-shard-*
          path: coverage-shards/

      - name: Combine raw V8 data from each shard
        run: |
          mkdir -p merged-raw
          shopt -s nullglob
          shard_count=0
          total_added=0
          for shard_dir in coverage-shards/playwright-coverage-shard-*/; do
            shard_count=$((shard_count + 1))
            added=0
            while IFS= read -r -d '' f; do
              cp -n "$f" "merged-raw/" && added=$((added + 1)) || true
            done < <(find "${shard_dir}" -type f \( -name 'coverage-*.json' -o -name 'source-*.json' \) -print0)
            total_added=$((total_added + added))
            if [ "$added" -eq 0 ]; then
              echo "⚠️  No raw V8 files found under ${shard_dir}"
            else
              echo "✓ ${shard_dir}: added ${added} raw file(s)"
            fi
          done
          echo "Combined ${total_added} raw file(s) from ${shard_count} shard artifact(s)"
          if [ "$total_added" -eq 0 ]; then
            echo "::warning::No raw coverage data found in any shard; merged report will be empty."
          fi

      - name: Generate merged coverage report
        run: |
          if [ -z "$(ls -A merged-raw 2>/dev/null)" ]; then
            echo "Skipping mcr — merged-raw is empty."
            exit 0
          fi
          # `merge` subcommand is required: without it the CLI just prints
          # help (see node_modules/monocart-coverage-reports/lib/cli.js
          # ~L237 — empty positional command short-circuits to outputHelp).
          # CLI flags override config-file values (index.js L258-262), so
          # -o here wins over the outputDir set in mcr.config.js.
          npx -y -p monocart-coverage-reports@2 mcr merge -c mcr.config.js -i merged-raw -o coverage-report-merged

      - name: Publish merged coverage to job summary
        if: always()
        run: |
          if [ -f coverage-report-merged/coverage-summary.md ]; then
            echo "## 📊 Playwright Code Coverage — Merged (all shards)" >> "$GITHUB_STEP_SUMMARY"
            cat coverage-report-merged/coverage-summary.md >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "_Full HTML report: download the \`playwright-coverage-merged\` artifact below._" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "⚠️ Merged coverage summary not generated (coverage-report-merged/coverage-summary.md missing)." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Artifact - Merged Coverage Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-coverage-merged
          path: coverage-report-merged/
          if-no-files-found: warn
          retention-days: 7

      - name: Delete per-shard coverage artifacts
        if: success() && hashFiles('coverage-report-merged/coverage-summary.md') != ''
        uses: geekyeggo/delete-artifact@v5
        with:
          name: playwright-coverage-shard-*
          failOnError: false
