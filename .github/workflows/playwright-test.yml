name: Playwright Tests
permissions:
  contents: read

on:
  pull_request:
  merge_group:

jobs:
  playwright-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Clear Docker cache
        run: docker builder prune -af

      - name: Execute Shell Script
        run: |
          chmod +x playwright-tests/start_hyperswitch.sh
          sh playwright-tests/start_hyperswitch.sh

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install --force

      - name: Install Playwright Browsers
        # Installing only Chrome (Chromium) for now
        # To add other browsers later:
        #   - Multiple: npx playwright install chromium firefox webkit --with-deps
        #   - Available: chromium, chrome, chrome-beta, msedge, msedge-beta, msedge-dev, firefox, webkit
        run: npx playwright install chromium --with-deps

      - name: Build application
        run: npm run build:test

      - name: Health check for Backend
        run: |
          # Once the backend services are up, hit the health endpoint with the actual curl request
          response=$(curl --location --request GET 'http://0.0.0.0:8080/health')
          echo "Response:"
          echo "$response"

      - name: Run Playwright tests
        run: npx playwright test
        env:
          PW_COVERAGE: "1"
          PLAYWRIGHT_USERNAME: ${{ secrets.CYPRESS_USERNAME }}
          PLAYWRIGHT_PASSWORD: ${{ secrets.CYPRESS_PASSWORD }}
          PLAYWRIGHT_SSO_BASE_URL: ${{ secrets.CYPRESS_SSO_BASE_URL }}
          PLAYWRIGHT_SSO_CLIENT_ID: ${{ secrets.CYPRESS_SSO_CLIENT_ID }}
          PLAYWRIGHT_SSO_CLIENT_SECRET: ${{ secrets.CYPRESS_SSO_CLIENT_SECRET }}
          PLAYWRIGHT_SSO_USERNAME: ${{ secrets.CYPRESS_SSO_USERNAME }}
          PLAYWRIGHT_SSO_PASSWORD: ${{ secrets.CYPRESS_SSO_PASSWORD }}

      - name: Publish Test Summary Results
        uses: ctrf-io/github-test-reporter@v1
        if: always()
        with:
          report-path: "./ctrf/*.json"
          github-report: true

      - name: Publish coverage to job summary
        if: always()
        run: |
          if [ -f coverage-report/coverage-summary.md ]; then
            echo "## 📊 Playwright Code Coverage" >> "$GITHUB_STEP_SUMMARY"
            cat coverage-report/coverage-summary.md >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "_Full HTML report: download the \`playwright-coverage\` artifact below._" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "⚠️ Coverage summary not generated (coverage-report/coverage-summary.md missing)." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Artifact - Failed Test Results Only
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-failures
          path: |
            test-results/**/*-failed-*
            test-results/**/*-retry*/
          if-no-files-found: ignore
          retention-days: 7

      - name: Artifact - Playwright HTML Report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Artifact - Playwright Coverage Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-coverage
          path: coverage-report/
          if-no-files-found: warn
          retention-days: 7
